name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Run package validation
        run: npm test
      - name: Check whitespace
        run: git diff --check
      - name: Check package contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pi-package-goal-pack.txt
          ! grep -E '(^|/)\.pi/|\.understand-anything|codebase-map-understand\.md' /tmp/pi-package-goal-pack.txt
      - name: Audit bundled Stitch tooling
        run: npm --prefix skills/frontend/stitch-react-components audit --omit=dev --audit-level=moderate
