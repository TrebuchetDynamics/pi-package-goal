      <circle r="18" fill="none" stroke="#73ffba" opacity="0.52"/>
      <path d="M-9 0L-2 7L11 -8" fill="none" stroke="#f4f7ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="930" y="74" fill="#73ffba" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1.5">GOAL_COMPLETE</text>
  </g>
