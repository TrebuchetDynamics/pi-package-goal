<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">pi-package-goal</title>
  <desc id="desc">A Pi workflow package that keeps the objective visible, routes work to specialist skills, and requires evidence before delivery.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#182033" stroke-width="1"/>
    </pattern>
    <clipPath id="panel-clip">
      <rect x="744" y="40" width="416" height="340" rx="24"/>
    </clipPath>
  </defs>

  <rect width="1200" height="420" rx="28" fill="#0b1020"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)" opacity="0.58"/>
  <path d="M0 1H1200" stroke="#73ffba" stroke-width="2"/>

  <g id="title-block" transform="translate(64 54)">
    <text x="0" y="0" dominant-baseline="hanging" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" letter-spacing="2.2">PI WORKFLOW PACKAGE / OBJECTIVE-FIRST</text>
    <text x="0" y="78" fill="#f4f7ff" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="62" font-weight="760" letter-spacing="-2.2">pi-package-goal</text>
    <text x="0" y="128" fill="#a6b0c3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">Keep the objective visible. Route work deliberately.</text>
    <text x="0" y="160" fill="#a6b0c3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">Ship only when the evidence is real.</text>

    <g transform="translate(0 202)">
      <rect width="612" height="58" rx="13" fill="#121827" stroke="#30415f"/>
      <circle cx="28" cy="29" r="5" fill="#73ffba"/>
      <text x="48" y="36" fill="#f4f7ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">pi install git:github.com/TrebuchetDynamics/pi-package-goal</text>
    </g>

    <g transform="translate(0 302)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="0" y="0" fill="#73ffba" font-size="24" font-weight="700">76</text>
      <text x="44" y="0" fill="#7888a0" font-size="13" letter-spacing="1.2">SKILLS</text>
      <path d="M132 -18V8" stroke="#30415f"/>
      <text x="160" y="0" fill="#67e8f9" font-size="24" font-weight="700">10</text>
      <text x="204" y="0" fill="#7888a0" font-size="13" letter-spacing="1.2">EXTENSIONS</text>
      <path d="M326 -18V8" stroke="#30415f"/>
      <text x="354" y="0" fill="#d8b4fe" font-size="24" font-weight="700">01</text>
      <text x="398" y="0" fill="#7888a0" font-size="13" letter-spacing="1.2">THEME</text>
    </g>
  </g>

  <g id="goal-trajectory" clip-path="url(#panel-clip)">
    <rect x="744" y="40" width="416" height="340" rx="24" fill="#121827" stroke="#30415f"/>
    <path d="M772 322C840 320 844 266 904 264S966 198 1017 174S1066 121 1109 89" fill="none" stroke="#73ffba" stroke-width="3"/>
    <path d="M772 332C846 330 852 280 910 278S980 218 1028 194" fill="none" stroke="#67e8f9" stroke-width="1" stroke-dasharray="5 8" opacity="0.48"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <g transform="translate(784 286)">
        <circle cx="0" cy="0" r="8" fill="#0b1020" stroke="#73ffba" stroke-width="2"/>
        <text x="18" y="5" fill="#f4f7ff" font-size="14">/goal</text>
        <text x="18" y="25" fill="#7888a0" font-size="11" letter-spacing="1">OBJECTIVE</text>
      </g>
      <g transform="translate(891 232)">
        <circle cx="0" cy="0" r="8" fill="#0b1020" stroke="#67e8f9" stroke-width="2"/>
        <text x="18" y="5" fill="#f4f7ff" font-size="14">skill-router</text>
        <text x="18" y="25" fill="#7888a0" font-size="11" letter-spacing="1">ROUTE</text>
      </g>
      <g transform="translate(991 165)">
        <circle cx="0" cy="0" r="8" fill="#0b1020" stroke="#ffe08a" stroke-width="2"/>
        <text x="18" y="5" fill="#f4f7ff" font-size="14">npm test</text>
        <text x="18" y="25" fill="#7888a0" font-size="11" letter-spacing="1">VERIFY</text>
      </g>
