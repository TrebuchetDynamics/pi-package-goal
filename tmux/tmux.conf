# Minimal tmux config for SSH/mobile/low-bandwidth compatibility.
# Keep resize behavior at tmux defaults: do not set window-size or aggressive-resize.

# Terminal compatibility. Prefer 256-color over truecolor to reduce SSH escape traffic.
set -g default-terminal "tmux-256color"
set -g focus-events off
set -s set-clipboard external
set -g extended-keys on
# Termius identifies as xterm-256color; synchronized output prevents partial-frame flicker.
# Reset first so repeated source-file reloads do not duplicate the feature entry.
set -su terminal-features
set -as terminal-features ',xterm-256color:sync'

# Scrollback and input
set -g history-limit 5000
setw -g mode-keys vi
set -g status-keys emacs
# Slightly relaxed timings tolerate mobile SSH jitter and slower touch key sequences.
set -sg escape-time 100
set -g repeat-time 750
set -g display-time 3000
set -g display-panes-time 2000

# Numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window/session behavior
setw -g automatic-rename off
setw -g allow-rename off
# Detach when this session ends instead of jumping to another session.
set -g detach-on-destroy on

# Responsive status bar: compact on phones, richer on wider terminals.
set -g status on
set -g status-position top
set -g status-interval 0
set -g @primary_color '#06d6a0'
set -g @primary_text_color '#101820'
source-file -q ~/.tmux/style.tmux
set -g status-style 'bg=#101820,fg=#f8f8f2'
# Keep narrow phone screens usable; show repo details only at 100+ columns.
set -g status-left "#[bg=#{@primary_color},fg=#{@primary_text_color},bold] #S #[bg=#101820,fg=#f8f8f2]#{?#{>=:#{client_width},100}, #(~/.tmux/short-path.sh #{q:pane_current_path}) #(~/.tmux/git-status.sh #{q:pane_current_path}),}"
set -g status-left-length 80
set -g status-right '#[fg=#ffd166,bold]#{?window_zoomed_flag, ZOOM ,}#[bg=#{@primary_color},fg=#{@primary_text_color},bold] #H '
set -g status-right-length 40
set -g window-status-format ''
set -g window-status-current-format ''

# Borders
set -g pane-border-style 'fg=#333333'
set -g pane-active-border-style 'fg=#5f87ff'

# Basic keybindings
bind R source-file ~/.tmux.conf \; display-message "Reloaded"
bind r refresh-client -S \; display-message "Redrawn"
bind t set-option status
bind m set-option -g mouse \; display-message 'Mouse: #{?mouse,on,off}'
bind v copy-mode

# Copy mode: keyboard first; prefix+m enables touch/mouse scrolling when wanted.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel

# New windows and splits keep current directory
bind c new-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Pane navigation
bind -r H select-pane -L
bind -r J select-pane -D
bind -r K select-pane -U
bind -r L select-pane -R

# Pane resize
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 3
bind -r C-k resize-pane -U 3
bind -r C-l resize-pane -R 5

# Session/window navigation
bind -r ( switch-client -p
bind -r ) switch-client -n
bind s choose-tree -s

# Local machine overrides, e.g. richer local terminals can re-enable dynamic status.
source-file -q ~/.tmux/local.tmux
