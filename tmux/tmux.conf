# ── Terminal & compatibility ──────────────────────────────────
set -g default-terminal "tmux-256color"
# Reset append-style options before appending so repeated reloads stay idempotent.
set -gu terminal-overrides
set -as terminal-overrides ",xterm-256color:RGB"
set -g extended-keys off
# Extended key negotiation can confuse some terminal apps; keep capability disabled.
# set -as terminal-features 'xterm*:extkeys'
set -gu terminal-features
set -as terminal-features '*:clipboard'
set -as terminal-features 'xterm*:mouse'
set -as terminal-features 'xterm*:RGB'
set -as terminal-features 'tmux*:RGB'
set -as terminal-features 'screen*:RGB'
set -g focus-events on
set -s set-clipboard external

# One clipboard command for copy-mode and tmux-yank.
# Prefer native Wayland/X11 clipboard when available; fall back to OSC 52.
%hidden COPY_CMD='sh -c "if command -v wl-copy >/dev/null 2>&1 && [ -n \"${WAYLAND_DISPLAY:-}\" ]; then wl-copy; elif command -v xclip >/dev/null 2>&1 && [ -n \"${DISPLAY:-}\" ]; then xclip -selection clipboard -in; elif command -v xsel >/dev/null 2>&1 && [ -n \"${DISPLAY:-}\" ]; then xsel --clipboard --input; else tmux load-buffer -w -; fi"'
set -s copy-command "$COPY_CMD"

# ── Sizing (multi-device: phone + desktop) ───────────────────
# Phone-safe: never size panes larger than the smallest attached client.
# This prevents small/mobile clients from losing the bottom/right of panes.
set -g window-size smallest
setw -g aggressive-resize off

# ── Scrollback & input ───────────────────────────────────────
set -g history-limit 200000
setw -g mode-keys vi
set -g status-keys emacs
set -sg escape-time 10         # avoids broken Alt/meta while staying responsive
set -g repeat-time 300         # shorter = fewer accidental repeats on touch
set -g display-time 2000       # messages stay visible after reconnect

# Phone scroll mode: tmux captures wheel/touch-scroll events and scrolls
# tmux history/copy-mode, without sending arrow input into apps.
# If your phone app only supports native terminal scrollback, toggle with prefix+m.
set -g mouse on

# ── Numbering (1-based, easier on phone keyboards) ──────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Window behavior ─────────────────────────────────────────
# Let tmux name windows from the foreground command, but ignore app title spam.
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'
setw -g automatic-rename on
setw -g automatic-rename-format '#{pane_current_command}'
setw -g allow-rename off
setw -g monitor-activity on
set -g visual-activity off

# ── Status bar ──────────────────────────────────────────────
set -g status on
# Keep the last terminal row for apps/prompts; mobile terminals often obscure it.
set -g status-position top
set -g status-interval 30
set -g status-style 'bg=#101820,fg=#f8f8f2,bold'
# User-facing color knobs. Used only for tmux name + hostname.
set -g @primary_color '#06d6a0'
set -g @primary_text_color '#101820'
set -g status-left '#[bg=#{@primary_color},fg=#{@primary_text_color},bold]  #S  #[bg=#101820,fg=#f8f8f2,bold] #(~/.tmux/short-path.sh #{q:pane_current_path})  #(~/.tmux/git-status.sh #{q:pane_current_path})'
set -g status-left-length 120
set -g status-right '#{?client_prefix,#[bg=#ffd166]#[fg=#101820]#[bold]  PREFIX  ,}#{?window_zoomed_flag,#[bg=#ef476f]#[fg=#ffffff]#[bold]  ZOOM  ,}#{?pane_synchronized,#[bg=#ffd166]#[fg=#101820]#[bold]  SYNC  ,}#[bg=#101820,fg=#f8f8f2] #[bg=#{@primary_color},fg=#{@primary_text_color},bold]  #H  '
set -g status-right-length 64
set -g window-status-format         ''
set -g window-status-current-format ''
set -g window-status-activity-style 'bg=#ffd166,fg=#101820,bold'
set -g window-status-bell-style     'bg=#ef476f,fg=#ffffff,bold'
set -g window-status-separator ' '
set -g status-format[1] '#[align=left]#[bg=#101820,fg=#ffd166,bold]  #{?pane_in_mode,COPY  ,}#(~/.tmux/git-status.sh #{q:pane_current_path})#[bg=#101820,fg=#f8f8f2,bold] #{pane_current_command}  #(~/.tmux/short-path.sh #{q:pane_current_path})  '

# ── Pane borders — minimal ──────────────────────────────────
set -g pane-border-lines single
set -g pane-border-indicators off
set -g pane-border-status off
# pane-scrollbars requires tmux ≥3.5a — uncomment when available
# set -g pane-scrollbars off
set -g pane-border-style 'fg=#333333'
set -g pane-active-border-style 'fg=#5f87ff'

# ── Popup & menu styles (tmux 3.4) ─────────────────────────
set -g popup-border-lines rounded
set -g popup-border-style 'fg=#555555'
set -g menu-style 'bg=#222222,fg=#ffffff'
set -g menu-border-style 'fg=#555555'

# ── Session safety ──────────────────────────────────────────
set -g detach-on-destroy on
set -g destroy-unattached off

# ── Keybindings ─────────────────────────────────────────────

# Toggle status bar on/off (prefix + t)
bind t set-option status

# Mouse toggle (prefix + m)
bind m if -F '#{mouse}' \
  'set -g mouse off; display "mouse OFF"' \
  'set -g mouse on;  display "mouse ON"'

# Session switcher — collapsed, no preview, zoomed (fits 18 rows)
bind s choose-tree -sNZ

# Buffer chooser (prefix + P), with bracketed paste into apps that request it.
bind P choose-buffer -NZ 'paste-buffer -p -b "%%"'

# Popup terminal overlay (prefix + `)
bind ` display-popup -E -w 90% -h 70%

# No-prefix window switching (Alt+number) — huge on touch keyboards
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-n next-window
bind -n M-p previous-window

# No-prefix scroll fallbacks for terminals that do not send touch as wheel.
# Tune these three values instead of editing every binding below.
%hidden PAGE_SCROLL_LINES='10'
%hidden KEY_SCROLL_LINES='5'
%hidden WHEEL_SCROLL_LINES='5'

bind -n PageUp copy-mode -e \; send -X -N $PAGE_SCROLL_LINES scroll-up
bind -n PageDown if -F '#{pane_in_mode}' "send -X -N $PAGE_SCROLL_LINES scroll-down"
bind -T copy-mode-vi PageUp send -X -N $PAGE_SCROLL_LINES scroll-up
bind -T copy-mode-vi PageDown send -X -N $PAGE_SCROLL_LINES scroll-down
bind -T copy-mode PageUp send -X -N $PAGE_SCROLL_LINES scroll-up
bind -T copy-mode PageDown send -X -N $PAGE_SCROLL_LINES scroll-down
bind -n S-Up copy-mode -e \; send -X -N $KEY_SCROLL_LINES scroll-up
bind -n S-Down if -F '#{pane_in_mode}' "send -X -N $KEY_SCROLL_LINES scroll-down"
bind -n C-Up copy-mode -e \; send -X -N $KEY_SCROLL_LINES scroll-up
bind -n C-Down if -F '#{pane_in_mode}' "send -X -N $KEY_SCROLL_LINES scroll-down"
bind -n M-Up copy-mode -e \; send -X -N $KEY_SCROLL_LINES scroll-up
bind -n M-Down if -F '#{pane_in_mode}' "send -X -N $KEY_SCROLL_LINES scroll-down"

# Wheel/touch scroll should inspect tmux history, not send input to apps.
# Target the pane under the finger/mouse. If your phone terminal still does
# nothing, enable mouse reporting in that app; tmux only sees sent wheel events.
bind -n WheelUpPane if -Ft= '#{pane_in_mode}' "send -t= -X -N $WHEEL_SCROLL_LINES scroll-up" "copy-mode -e -t= \; send -t= -X -N $WHEEL_SCROLL_LINES scroll-up"
bind -n WheelDownPane if -Ft= '#{pane_in_mode}' "send -t= -X -N $WHEEL_SCROLL_LINES scroll-down"
bind -T copy-mode-vi WheelUpPane select-pane -t= \; send -t= -X -N $WHEEL_SCROLL_LINES scroll-up
bind -T copy-mode-vi WheelDownPane select-pane -t= \; send -t= -X -N $WHEEL_SCROLL_LINES scroll-down
bind -T copy-mode WheelUpPane select-pane -t= \; send -t= -X -N $WHEEL_SCROLL_LINES scroll-up
bind -T copy-mode WheelDownPane select-pane -t= \; send -t= -X -N $WHEEL_SCROLL_LINES scroll-down

# Vi copy mode — use tmux's native OSC 52 path so copies work over SSH
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel

# Pane resize (big jumps for thumb tapping)
bind -r C-h resize-pane -L 8
bind -r C-j resize-pane -D 4
bind -r C-k resize-pane -U 4
bind -r C-l resize-pane -R 8

# Pane navigation (prefix + uppercase vim keys)
bind -r H select-pane -L
bind -r J select-pane -D
bind -r K select-pane -U
bind -r L select-pane -R

# New windows and splits keep current directory
bind c new-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Quick layouts
bind = select-layout even-vertical
bind + select-layout even-horizontal

# Session cycling
bind -r ( switch-client -p
bind -r ) switch-client -n

# Reload config
bind R source ~/.tmux.conf \; display "Reloaded"

# ── Plugins (TPM) ───────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-yank: keep keyboard yanks, but let tmux handle mouse selection.
# Reuse COPY_CMD so Wayland/X11 work locally and OSC 52 works over SSH.
set -g @override_copy_command "$COPY_CMD"
set -g @yank_with_mouse off
set -g @yank_selection_mouse 'clipboard'

# tmux-resurrect: capture pane contents + (n)vim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim  'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: autosave every 15 min, restore on tmux start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Init TPM if installed — keep as LAST line.
# Install TPM with: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
if-shell 'test -x ~/.tmux/plugins/tpm/tpm' 'run ~/.tmux/plugins/tpm/tpm' 'display-message "TPM not installed; plugins skipped"'
