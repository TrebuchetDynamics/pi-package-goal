# Minimal tmux config for SSH/mobile compatibility.
# Keep resize behavior at tmux defaults: do not set window-size or aggressive-resize.

# Terminal compatibility
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -g focus-events off
set -s set-clipboard external

# Scrollback and input
set -g history-limit 200000
setw -g mode-keys vi
set -g status-keys emacs
set -sg escape-time 50
set -g repeat-time 500
set -g display-time 3000

# Numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window behavior
setw -g automatic-rename on
setw -g allow-rename off

# Simple status bar
set -g status on
set -g status-position top
set -g status-interval 120
set -g @primary_color '#06d6a0'
set -g @primary_text_color '#101820'
source-file -q ~/.tmux/style.tmux
set -g status-style 'bg=#101820,fg=#f8f8f2'
set -g status-left '#[bg=#{@primary_color},fg=#{@primary_text_color},bold] #S #[bg=#101820,fg=#f8f8f2] #(~/.tmux/short-path.sh #{q:pane_current_path}) #(~/.tmux/git-status.sh #{q:pane_current_path})'
set -g status-left-length 100
set -g status-right '#[bg=#{@primary_color},fg=#{@primary_text_color},bold] #H '
set -g status-right-length 40
set -g window-status-format ''
set -g window-status-current-format ''

# Borders
set -g pane-border-style 'fg=#333333'
set -g pane-active-border-style 'fg=#5f87ff'

# Basic keybindings
bind R source-file ~/.tmux.conf \; display-message "Reloaded"
bind t set-option status

# Copy mode: keyboard only
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel

# New windows and splits keep current directory
bind c new-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Pane navigation
bind -r H select-pane -L
bind -r J select-pane -D
bind -r K select-pane -U
bind -r L select-pane -R

# Pane resize
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 3
bind -r C-k resize-pane -U 3
bind -r C-l resize-pane -R 5

# Session/window navigation
bind -r ( switch-client -p
bind -r ) switch-client -n
bind s choose-tree -s

# Local machine overrides, e.g. mobile/SSH clients can disable status refreshes.
source-file -q ~/.tmux/local.tmux
